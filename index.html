<body>
    <div id="root"><div class="min-h-screen bg-[#020617] text-slate-200 flex flex-col items-center p-4 md:p-12"><div class="max-w-xl w-full bg-[#0f172a] rounded-3xl shadow-2xl border border-white/5 overflow-hidden flex flex-col"><div class="p-8 md:p-12 flex-grow flex flex-col justify-center min-h-[500px]"><div class="text-center fade-in"><h1 class="text-6xl font-serif mb-4 text-amber-50 text-glow">Чарадор</h1><p class="text-slate-500 mb-12 font-story italic text-lg tracking-wide">Легенда о маленьком свете в великой Тьме</p><div class="flex flex-col items-center gap-6"><button class="group relative px-12 py-4 bg-amber-700/10 border border-amber-500/30 rounded-full overflow-hidden hover:bg-amber-700/30 transition-all shadow-inner"><span class="relative z-10 font-bold uppercase tracking-[0.3em] text-amber-200 text-xs">Начать путь</span></button><button class="text-[10px] text-slate-600 hover:text-amber-500 uppercase tracking-widest transition-colors flex items-center gap-2"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>Скачать код для GitHub</button></div></div></div></div><div class="mt-12 text-slate-700 text-[10px] uppercase tracking-[0.4em] font-bold text-center">Чарадор • Хроники маленьких героев</div></div></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [gameState, setGameState] = useState('START'); 
            const [hero, setHero] = useState(null);
            const [spark, setSpark] = useState(100);
            const [chapter, setChapter] = useState(1);
            const [inventory, setInventory] = useState([]);
            const [log, setLog] = useState([]);

            const chapters = {
                1: {
                    title: "Тень на террасе",
                    text: "Вечер в Дремуше был наполнен ароматом жасминового чая и теплой корицы. Но внезапно луна погасла. Ты чувствуешь, как холод Калта покалывает кожу сквозь шерстяную жилетку. Чай в чашке мгновенно покрывается коркой льда. Из тумана у реки Чаруши выплывают Смерги — безликие башни из копоти, пахнущие озоном и ледяной пылью.",
                    options: [
                        {
                            label: "Использовать магию Фа",
                            effect: () => {
                                setSpark(prev => Math.max(0, prev - 15));
                                addLog("Ты направляешь чистую энергию Фа. Тьма шипит и отступает, но ты чувствуешь, как часть твоей искры угасла.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Спрятаться в корнях Мирина",
                            effect: () => {
                                addLog("Ты ныряешь в глубокую нору. Тень проходит мимо, но страх ледяным комом оседает в груди.");
                                nextChapter();
                            }
                        }
                    ]
                },
                2: {
                    title: "Плюшки под пеплом",
                    text: "Твой дом теперь кажется чужим. Любимые плюшки на столе превратились в серый прах. Воздух пахнет горечью. Нужно спешить к Обережному мосту, пока туман не скрыл тропу полностью.",
                    options: [
                        {
                            label: "Забрать памятный амулет",
                            effect: () => {
                                setInventory(prev => [...prev, "Амулет Дома"]);
                                addLog("Ты спасаешь частичку прошлого. Тьма подбирается ближе.");
                                setSpark(prev => Math.max(0, prev - 5));
                                nextChapter();
                            }
                        },
                        {
                            label: "Бежать к мосту",
                            effect: () => {
                                addLog("Ты успеваешь до того, как тропа окончательно исчезла в тумане.");
                                nextChapter();
                            }
                        }
                    ]
                },
                3: {
                    title: "Обережный мосток",
                    text: "Ручей Чаруша теперь похож на поток черной смолы. Мост скрипит, руны на его перилах едва светятся. Чтобы пройти, нужно пробудить древние знаки. Воздух здесь звенит от напряжения, а за спиной слышны тяжелые, влажные шаги Смергов.",
                    options: [
                        {
                            label: "Активировать руны кровью и Фа",
                            effect: () => {
                                setSpark(prev => Math.max(0, prev - 20));
                                addLog("Руны вспыхнули алым. Мост пропустил тебя, но силы покидают твоё маленькое тело.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Попытаться проскользнуть незаметно",
                            effect: () => {
                                if (Math.random() > 0.5) {
                                    addLog("Тебе повезло. Тени скользнули мимо, не заметив твоего дыхания.");
                                } else {
                                    setSpark(prev => Math.max(0, prev - 10));
                                    addLog("Смерг задел тебя ледяным крылом. Ожог холода будет болеть долго.");
                                }
                                nextChapter();
                            }
                        }
                    ]
                },
                4: {
                    title: "Шепот берегини",
                    text: "В лесу ты встречаешь слабую Искру — это дух маленькой птицы, застрявший в ловушке Тьмы. Она молит о спасении, но Смерги уже окружают это место. Время уходит.",
                    options: [
                        {
                            label: "Пожертвовать Искрой ради спасения",
                            effect: () => {
                                setSpark(prev => Math.max(0, prev - 25));
                                setInventory(prev => [...prev, "Перо Света"]);
                                addLog("Дух спасен. В благодарность ты получаешь сияющее перо, которое согревает ладони.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Оставить дух и спасаться самому",
                            effect: () => {
                                addLog("Ты уходишь. Тихий плач за спиной будет преследовать тебя в снах.");
                                nextChapter();
                            }
                        }
                    ]
                },
                5: {
                    title: "Черное яблоко",
                    text: "На краю леса ты находишь дерево, чьи плоды еще не полностью поглощены Калтом. Одно яблоко светится тусклым золотом под слоем копоти. Это след Огнесада. Магия в нем может восстановить твои силы или подпитать землю.",
                    options: [
                        {
                            label: "Съесть яблоко (Восстановление)",
                            effect: () => {
                                setSpark(prev => Math.min(100, prev + 30));
                                addLog("Тепло разливается по жилам. Ты чувствуешь прилив сил.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Вернуть магию корням",
                            effect: () => {
                                addLog("Ты отдаешь свет земле. Мирин благодарно вздрагивает под твоими ногами.");
                                nextChapter();
                            }
                        }
                    ]
                }
            };

            const addLog = (msg) => setLog(prev => [msg, ...prev].slice(0, 3));

            const nextChapter = () => {
                if (chapters[chapter + 1]) setChapter(prev => prev + 1);
                else setGameState('DEMO_END');
            };

            const selectHero = (type) => {
                setHero(type);
                setInventory(type === 'Дрыхала' ? ['Латар'] : ['Котел']);
                setGameState('PLAYING');
            };

            const downloadSourceCode = () => {
                const source = document.documentElement.outerHTML;
                const blob = new Blob([source], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'index.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            if (spark <= 0) return (
                <div className="min-h-screen bg-black text-blue-200 flex flex-col items-center justify-center p-8 text-center font-serif">
                    <h1 className="text-5xl mb-4">Вечный Сон</h1>
                    <p className="max-w-md italic opacity-70">Твоя Искра угасла. Тень Калта поглотила тебя...</p>
                    <button onClick={() => window.location.reload()} className="mt-8 px-6 py-2 border border-blue-900 rounded hover:bg-blue-950 transition text-sm uppercase tracking-widest">Пробудиться</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#020617] text-slate-200 flex flex-col items-center p-4 md:p-12">
                    <div className="max-w-xl w-full bg-[#0f172a] rounded-3xl shadow-2xl border border-white/5 overflow-hidden flex flex-col">
                        
                        {gameState === 'PLAYING' && (
                            <div className="bg-black/40 px-6 py-4 flex justify-between items-center border-b border-white/5">
                                <div className="text-[10px] uppercase tracking-[0.2em] text-amber-500 font-bold">{hero}</div>
                                <div className="flex items-center gap-4">
                                    <div className="text-[10px] uppercase tracking-widest text-slate-500">Искра: {spark}%</div>
                                    <div className="w-20 h-1 bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-amber-500 transition-all duration-700" style={{width: `${spark}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="p-8 md:p-12 flex-grow flex flex-col justify-center min-h-[500px]">
                            {gameState === 'START' && (
                                <div className="text-center fade-in">
                                    <h1 className="text-6xl font-serif mb-4 text-amber-50 text-glow">Чарадор</h1>
                                    <p className="text-slate-500 mb-12 font-story italic text-lg tracking-wide">Легенда о маленьком свете в великой Тьме</p>
                                    <div className="flex flex-col items-center gap-6">
                                        <button onClick={() => setGameState('CHARACTER_SELECT')} className="group relative px-12 py-4 bg-amber-700/10 border border-amber-500/30 rounded-full overflow-hidden hover:bg-amber-700/30 transition-all shadow-inner">
                                            <span className="relative z-10 font-bold uppercase tracking-[0.3em] text-amber-200 text-xs">Начать путь</span>
                                        </button>
                                        <button onClick={downloadSourceCode} className="text-[10px] text-slate-600 hover:text-amber-500 uppercase tracking-widest transition-colors flex items-center gap-2">
                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                            Скачать код для GitHub
                                        </button>
                                    </div>
                                </div>
                            )}

                            {gameState === 'CHARACTER_SELECT' && (
                                <div className="fade-in space-y-8 text-center">
                                    <h2 className="text-2xl font-serif mb-4">Выберите свою судьбу</h2>
                                    <div className="grid gap-6">
                                        <button onClick={() => selectHero('Дрыхала')} className="p-8 bg-white/5 rounded-2xl border border-white/5 hover:border-amber-500/50 transition-all text-left group">
                                            <div className="text-amber-400 font-bold mb-2 flex items-center gap-2">
                                                <span>🎶 Дрыхала</span>
                                            </div>
                                            <div className="text-sm text-slate-400 font-story leading-relaxed">Музыкант, владеющий Латаром. Ваша магия — в звуках, резонансе и тонких чувствах мира.</div>
                                        </button>
                                        <button onClick={() => selectHero('Бермяш')} className="p-8 bg-white/5 rounded-2xl border border-white/5 hover:border-amber-500/50 transition-all text-left group">
                                            <div className="text-amber-400 font-bold mb-2 flex items-center gap-2">
                                                <span>🍯 Бермяш</span>
                                            </div>
                                            <div className="text-sm text-slate-400 font-story leading-relaxed">Хранитель уюта с Волшебным Котлом. Ваша сила — в созидании, тепле очага и защите.</div>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {gameState === 'PLAYING' && (
                                <div className="fade-in">
                                    <div className="flex justify-between items-center mb-6">
                                        <div className="text-[10px] text-amber-600 font-bold uppercase tracking-widest">Глава {chapter} из 10</div>
                                        <div className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Инвентарь: {inventory.length}</div>
                                    </div>
                                    <h3 className="text-3xl font-serif mb-6 text-white leading-tight">{chapters[chapter].title}</h3>
                                    <p className="text-lg font-story italic leading-relaxed text-slate-300 mb-10 border-l-2 border-amber-500/20 pl-8">
                                        {chapters[chapter].text}
                                    </p>
                                    <div className="grid gap-4">
                                        {chapters[chapter].options.map((opt, i) => (
                                            <button key={i} onClick={opt.effect} className="w-full py-5 px-8 bg-white/5 hover:bg-white/10 rounded-2xl text-left text-sm transition-all border border-white/5 hover:border-white/10 flex justify-between items-center group shadow-lg">
                                                <span className="font-medium">{opt.label}</span>
                                                <span className="text-amber-500 opacity-0 group-hover:opacity-100 transition-all translate-x-2 group-hover:translate-x-0">→</span>
                                            </button>
                                        ))}
                                    </div>
                                    {log.length > 0 && (
                                        <div className="mt-12 opacity-50 text-[10px] uppercase tracking-wider space-y-2 border-t border-white/5 pt-6">
                                            {log.map((m, i) => <div key={i} className="animate-in slide-in-from-left-4">• {m}</div>)}
                                        </div>
                                    )}
                                </div>
                            )}

                            {gameState === 'DEMO_END' && (
                                <div className="text-center fade-in">
                                    <h2 className="text-4xl font-serif text-amber-200 mb-6">Граница Хельгара</h2>
                                    <p className="text-slate-400 font-story italic mb-10 text-lg leading-relaxed">
                                        Ты прошел через Тень Дремуша и коснулся магии Золотого Яблока. Впереди — ледяные пустоши Огненных земель.
                                    </p>
                                    <div className="bg-black/30 p-6 rounded-2xl mb-10 text-left">
                                        <div className="text-xs text-amber-600 font-bold uppercase mb-4 tracking-widest">Ваши достижения</div>
                                        <div className="space-y-2 text-sm text-slate-300">
                                            <div className="flex justify-between"><span>Состояние искры:</span> <span className="text-amber-400 font-bold">{spark}%</span></div>
                                            <div className="flex justify-between"><span>Собрано артефактов:</span> <span className="text-amber-400 font-bold">{inventory.join(', ')}</span></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center gap-6">
                                        <button onClick={() => window.location.reload()} className="text-xs text-amber-500 uppercase tracking-widest hover:text-amber-400 transition-colors border-b border-amber-500/20 pb-1">Вернуться к истокам</button>
                                        <button onClick={downloadSourceCode} className="text-[10px] text-slate-600 hover:text-amber-500 uppercase tracking-widest transition-colors flex items-center gap-2">
                                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                            Скачать финальный код
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="mt-12 text-slate-700 text-[10px] uppercase tracking-[0.4em] font-bold text-center">
                        Чарадор • Хроники маленьких героев
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
