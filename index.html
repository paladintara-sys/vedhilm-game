    <div id="root"><div class="min-h-screen bg-[#020617] text-slate-200 flex flex-col items-center p-2 md:p-8"><div class="max-w-4xl w-full flex flex-col md:flex-row gap-4"><div class="flex-grow bg-[#0f172a] rounded-3xl shadow-2xl border border-white/5 overflow-hidden flex flex-col min-h-[600px]"><div class="p-8 md:p-12 flex-grow flex flex-col justify-center"><div class="text-center fade-in"><h1 class="text-6xl font-serif mb-4 text-amber-50 text-glow">Чарадор</h1><p class="text-slate-400 mb-12 font-story italic text-xl tracking-wide">Путь через Дремобор к древу Сантлит</p><div class="flex flex-col items-center gap-6"><button class="px-10 py-4 bg-amber-700/20 border border-amber-500/40 rounded-xl hover:bg-amber-700/40 transition-all shadow-lg hover:scale-105"><span class="font-bold uppercase tracking-[0.2em] text-amber-100 text-sm">Начать легенду</span></button><button class="text-[10px] text-slate-500 hover:text-amber-500 uppercase tracking-widest transition-colors flex items-center gap-2 mt-4"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>Скачать код для GitHub</button></div></div></div></div></div></div></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [gameState, setGameState] = useState('START'); 
            const [hero, setHero] = useState(null);
            
            // Новые характеристики
            const [life, setLife] = useState(100);
            const [magic, setMagic] = useState(100);
            const [companion, setCompanion] = useState({ name: '', status: 'Жив' }); // Жив, Ранен, Мертв
            
            const [chapter, setChapter] = useState(1);
            const [inventory, setInventory] = useState([]);
            const [log, setLog] = useState([]);

            // Проверка наличия предмета
            const hasItem = (item) => inventory.includes(item);

            const chapters = {
                1: {
                    title: "Тень на террасе",
                    text: "Вечер в Дремуше был наполнен ароматом жасминового чая. Но внезапно луна погасла. Холод Калта покалывает кожу. Чай в чашке мгновенно покрывается коркой льда. Из тумана выплывают Смерги — безликие башни из копоти. Твой друг в ужасе застыл рядом.",
                    options: [
                        {
                            label: "Ударить магией Фа (Трата Магии)",
                            effect: () => {
                                setMagic(prev => Math.max(0, prev - 20));
                                addLog("Ты направляешь энергию Фа. Тьма отступает, но магия истощается.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Спрятаться в корнях Древобора (Риск Жизнью)",
                            effect: () => {
                                setLife(prev => Math.max(0, prev - 15));
                                addLog("Вы с другом ныряете в корни Древобора. Смерги проходят по верху, но колючие корни ранят тебя.");
                                nextChapter();
                            }
                        }
                    ]
                },
                2: {
                    title: "Плюшки под пеплом",
                    text: "Твой дом теперь кажется чужим. Любимые плюшки на столе превратились в серый прах. Воздух пахнет горечью. Нужно спешить к Обережному мосту, пока туман не скрыл тропу через лес Дремобор полностью.",
                    options: [
                        {
                            label: "Забрать памятный Амулет Дома",
                            effect: () => {
                                setInventory(prev => [...prev, "Амулет Дома"]);
                                setLife(prev => Math.max(0, prev - 10));
                                addLog("Ты задерживаешься ради Амулета. Ледяное дыхание Смерга задевает тебя.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Сбежать без оглядки, спасая силы",
                            effect: () => {
                                setLife(prev => Math.min(100, prev + 10));
                                addLog("Инстинкт выживания придает сил. Вы успеваете скрыться.");
                                nextChapter();
                            }
                        }
                    ]
                },
                3: {
                    title: "Обережный мост Серебрянки",
                    text: "Через Чарушу нет мостов, но от неё отделяется речка Серебрянка и течет через лес Дремобор к озеру Серебряное. Именно здесь находится Обережный мост. Руны на его перилах угасли. Смерги наступают на пятки.",
                    options: [
                        {
                            label: "Напитать руны своей Магией",
                            effect: () => {
                                setMagic(prev => Math.max(0, prev - 25));
                                addLog("Руны вспыхнули синим. Мост пропустил вас, отрезав путь Тьме.");
                                nextChapter();
                            }
                        },
                        {
                            label: "Прорваться силой, защищая друга телом",
                            effect: () => {
                                setLife(prev => Math.max(0, prev - 25));
                                setCompanion(prev => ({...prev, status: 'Жив'}));
                                addLog("Мост рушится под ногами! Ты получаешь сильные ушибы, но перебрасываешь друга на другой берег.");
                                nextChapter();
                            }
                        },
                        // Скрытая опция, если есть Латар
                        {
                            label: "🗝️ [Латар] Сыграть песню Серебрянки",
                            condition: () => hasItem("Латар"),
                            effect: () => {
                                setMagic(prev => Math.min(100, prev + 15));
                                addLog("Река отзывается на музыку! Вода поднимается стеной, смывая Смергов и даруя тебе резонанс магии.");
                                nextChapter();
                            }
                        }
                    ]
                },
                4: {
                    title: "Засада в Дремоборе",
                    text: `Лес Дремобор густой и мрачный. Внезапно из-под земли вырываются щупальца из пепла. Одно из них хватает твоего спутника (${companion.name})! Он кричит, его Искра угасает на глазах.`,
                    options: [
                        {
                            label: "Отдать часть Жизни, чтобы вырвать друга",
                            effect: () => {
                                setLife(prev => Math.max(0, prev - 30));
                                addLog(`Ты бросаешься в пепел! Раны глубоки, но ${companion.name} спасен.`);
                                nextChapter();
                            }
                        },
                        {
                            label: "Использовать всю доступную Магию",
                            effect: () => {
                                setMagic(prev => Math.max(0, prev - 40));
                                addLog(`Всплеск чистой энергии разрывает путы! ${companion.name} падает на землю, тяжело дыша.`);
                                nextChapter();
                            }
                        },
                        {
                            label: "Бросить его и спасаться (Восстановить обе шкалы)",
                            effect: () => {
                                setLife(100);
                                setMagic(100);
                                setCompanion(prev => ({...prev, status: 'Мертв'}));
                                addLog("Темный выбор... Тьма насытилась чужой Искрой, позволив тебе сбежать и восстановить силы, но ценой предательства.");
                                nextChapter();
                            }
                        },
                         // Скрытая опция, если есть Котел
                         {
                            label: "🗝️ [Котел] Бросить зелье тепла в Тень",
                            condition: () => hasItem("Котел"),
                            effect: () => {
                                addLog("Взрыв уютного тепла сжигает щупальца Смергов в мгновение ока! Вы оба целы.");
                                nextChapter();
                            }
                        }
                    ]
                },
                5: {
                    title: "Дерево Сантлит",
                    text: "Выбравшись из Дремобора, ты выходишь в старый лес. Перед тобой возвышается Сантлит — священное Дерево Жизни, сияющее теплым, золотистым светом. Оно способно очистить земли, но требует подношения.",
                    options: [
                        {
                            label: "Коснуться Дерева вместе с другом",
                            condition: () => companion.status === 'Жив',
                            effect: () => {
                                addLog(`Сантлит признает Силу Двоих. Вы с ${companion.name} пробуждаете свет, который изгоняет Тьму!`);
                                setGameState('VICTORY_TOGETHER');
                            }
                        },
                        {
                            label: "🗝️ [Амулет Дома] Возложить память о доме к корням",
                            condition: () => hasItem("Амулет Дома") && companion.status === 'Жив',
                            effect: () => {
                                addLog("Дерево принимает Амулет. Память о доме становится щитом для всего мира. Истинная победа!");
                                setGameState('VICTORY_TRUE');
                            }
                        },
                        {
                            label: "Приблизиться к Дереву в одиночестве",
                            condition: () => companion.status === 'Мертв',
                            effect: () => {
                                addLog("Сантлит тускло светится. Тьма остановлена, но пустота в твоем сердце останется навсегда.");
                                setGameState('VICTORY_ALONE');
                            }
                        }
                    ]
                }
            };

            const addLog = (msg) => setLog(prev => [msg, ...prev].slice(0, 4));

            const nextChapter = () => {
                if (chapters[chapter + 1]) setChapter(prev => prev + 1);
            };

            const selectHero = (type) => {
                setHero(type);
                setCompanion({ 
                    name: type === 'Дрыхала' ? 'Бермяш' : 'Дрыхала', 
                    status: 'Жив' 
                });
                setInventory(type === 'Дрыхала' ? ['Латар'] : ['Котел']);
                setGameState('PLAYING');
            };

            const downloadSourceCode = () => {
                const source = document.documentElement.outerHTML;
                const blob = new Blob([source], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'charador_game.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // Проверка смерти
            useEffect(() => {
                if (life <= 0 && gameState === 'PLAYING') {
                    setGameState('GAME_OVER');
                }
            }, [life, gameState]);

            if (gameState === 'GAME_OVER') return (
                <div className="min-h-screen bg-black text-red-200 flex flex-col items-center justify-center p-8 text-center font-serif">
                    <h1 className="text-5xl mb-4">Вечный Сон</h1>
                    <p className="max-w-md italic opacity-70">Твоя Искра Жизни угасла. Тень Калта поглотила тебя и этот лес...</p>
                    <button onClick={() => window.location.reload()} className="mt-8 px-8 py-3 border border-red-900 rounded-lg hover:bg-red-950 transition text-sm uppercase tracking-widest">Пробудиться вновь</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#020617] text-slate-200 flex flex-col items-center p-2 md:p-8">
                    
                    {/* Main Game Container */}
                    <div className="max-w-4xl w-full flex flex-col md:flex-row gap-4">
                        
                        {/* Left Side: Story Window */}
                        <div className="flex-grow bg-[#0f172a] rounded-3xl shadow-2xl border border-white/5 overflow-hidden flex flex-col min-h-[600px]">
                            
                            {/* Header Stats */}
                            {gameState === 'PLAYING' && (
                                <div className="bg-black/50 px-6 py-4 grid grid-cols-2 gap-4 border-b border-white/10 items-center">
                                    <div className="flex flex-col gap-2">
                                        <div className="flex items-center justify-between text-xs">
                                            <span className="text-rose-400 font-bold uppercase tracking-wider">Жизнь</span>
                                            <span>{life}%</span>
                                        </div>
                                        <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-rose-500 transition-all duration-500" style={{width: `${life}%`}}></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <div className="flex items-center justify-between text-xs">
                                            <span className="text-blue-400 font-bold uppercase tracking-wider">Магия</span>
                                            <span>{magic}%</span>
                                        </div>
                                        <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-blue-500 transition-all duration-500" style={{width: `${magic}%`}}></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Content Area */}
                            <div className="p-8 md:p-12 flex-grow flex flex-col justify-center">
                                {gameState === 'START' && (
                                    <div className="text-center fade-in">
                                        <h1 className="text-6xl font-serif mb-4 text-amber-50 text-glow">Чарадор</h1>
                                        <p className="text-slate-400 mb-12 font-story italic text-xl tracking-wide">Путь через Дремобор к древу Сантлит</p>
                                        <div className="flex flex-col items-center gap-6">
                                            <button onClick={() => setGameState('CHARACTER_SELECT')} className="px-10 py-4 bg-amber-700/20 border border-amber-500/40 rounded-xl hover:bg-amber-700/40 transition-all shadow-lg hover:scale-105">
                                                <span className="font-bold uppercase tracking-[0.2em] text-amber-100 text-sm">Начать легенду</span>
                                            </button>
                                            <button onClick={downloadSourceCode} className="text-[10px] text-slate-500 hover:text-amber-500 uppercase tracking-widest transition-colors flex items-center gap-2 mt-4">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                                Скачать код для GitHub
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {gameState === 'CHARACTER_SELECT' && (
                                    <div className="fade-in space-y-8 text-center">
                                        <h2 className="text-3xl font-serif mb-8 text-amber-100">Выберите героя</h2>
                                        <div className="grid gap-6 md:grid-cols-2">
                                            <button onClick={() => selectHero('Дрыхала')} className="p-8 bg-white/5 rounded-2xl border border-white/10 hover:border-amber-400 transition-all text-left group hover:bg-white/10">
                                                <div className="text-amber-400 font-bold mb-3 text-xl">🎶 Дрыхала</div>
                                                <div className="text-sm text-slate-300 font-story leading-relaxed">Мастер звука. Начинает игру с артефактом <span className="text-amber-200">Латар</span>. Ваш спутник: Бермяш.</div>
                                            </button>
                                            <button onClick={() => selectHero('Бермяш')} className="p-8 bg-white/5 rounded-2xl border border-white/10 hover:border-amber-400 transition-all text-left group hover:bg-white/10">
                                                <div className="text-amber-400 font-bold mb-3 text-xl">🍯 Бермяш</div>
                                                <div className="text-sm text-slate-300 font-story leading-relaxed">Хранитель уюта. Начинает игру с артефактом <span className="text-amber-200">Волшебный Котел</span>. Ваш спутник: Дрыхала.</div>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {gameState === 'PLAYING' && (
                                    <div className="fade-in flex flex-col h-full">
                                        <div className="text-xs text-amber-600 font-bold uppercase tracking-widest mb-4">Глава {chapter} из 5</div>
                                        <h3 className="text-4xl font-serif mb-6 text-white leading-tight">{chapters[chapter].title}</h3>
                                        <p className="text-xl font-story italic leading-relaxed text-slate-300 mb-8 border-l-4 border-amber-500/30 pl-6">
                                            {chapters[chapter].text}
                                        </p>
                                        
                                        <div className="grid gap-3 mt-auto">
                                            {chapters[chapter].options.filter(opt => !opt.condition || opt.condition()).map((opt, i) => (
                                                <button key={i} onClick={opt.effect} className={`w-full py-4 px-6 rounded-xl text-left text-sm transition-all flex justify-between items-center group ${opt.label.includes('🗝️') ? 'bg-amber-900/20 border border-amber-500/50 hover:bg-amber-900/40 text-amber-100' : 'bg-slate-800/50 border border-white/5 hover:bg-slate-700/80 text-slate-200'}`}>
                                                    <span className="font-medium text-base">{opt.label}</span>
                                                    <span className="text-amber-500 opacity-0 group-hover:opacity-100 transition-all translate-x-2 group-hover:translate-x-0">→</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {gameState.startsWith('VICTORY') && (
                                    <div className="text-center fade-in">
                                        <h2 className="text-5xl font-serif text-amber-300 mb-6 text-glow">Свет Сантлита</h2>
                                        
                                        {gameState === 'VICTORY_TOGETHER' && (
                                            <p className="text-slate-300 font-story italic mb-8 text-xl leading-relaxed">
                                                Вы вдвоем коснулись корней. Священное дерево вспыхнуло, озарив Дремобор светом, который отбросил Смергов обратно в пустоту. Вы спасли свой лес.
                                            </p>
                                        )}
                                        {gameState === 'VICTORY_TRUE' && (
                                            <p className="text-amber-200 font-story italic mb-8 text-xl leading-relaxed magic-glow">
                                                Амулет Дома слился с корнями Дерева! Сила родного очага и магия Сантлита создали вечный барьер над Чарадором. Это истинный триумф Света!
                                            </p>
                                        )}
                                        {gameState === 'VICTORY_ALONE' && (
                                            <p className="text-slate-400 font-story italic mb-8 text-xl leading-relaxed">
                                                Свет Дерева тусклый, но его хватает, чтобы прогнать Тени. Ты выжил, но цена оказалась слишком высока. Ветер шепчет имя твоего друга...
                                            </p>
                                        )}

                                        <button onClick={() => window.location.reload()} className="mt-8 px-8 py-3 border border-amber-500/50 text-amber-500 rounded-lg hover:bg-amber-900/30 transition text-sm uppercase tracking-widest">Новое предание</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Right Side: Inventory & Status Panel (Visible only when playing) */}
                        {gameState === 'PLAYING' && (
                            <div className="w-full md:w-64 bg-[#0f172a] rounded-3xl shadow-2xl border border-white/5 p-6 flex flex-col gap-6 fade-in shrink-0">
                                
                                {/* Companion Status */}
                                <div>
                                    <h4 className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-3">Ваш спутник</h4>
                                    <div className="bg-slate-900/50 rounded-xl p-4 border border-white/5">
                                        <div className="text-amber-400 font-bold mb-1">{companion.name}</div>
                                        <div className={`text-xs font-bold uppercase tracking-wider ${companion.status === 'Жив' ? 'text-emerald-400' : 'text-red-500'}`}>
                                            {companion.status}
                                        </div>
                                    </div>
                                </div>

                                {/* Inventory */}
                                <div className="flex-grow flex flex-col">
                                    <h4 className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-3 flex justify-between">
                                        <span>Артефакты</span>
                                        <span>{inventory.length}</span>
                                    </h4>
                                    <div className="flex-grow bg-slate-900/50 rounded-xl p-4 border border-white/5 inventory-scroll overflow-y-auto">
                                        {inventory.length === 0 ? (
                                            <div className="text-xs text-slate-600 italic text-center mt-4">Сумка пуста</div>
                                        ) : (
                                            <div className="flex flex-col gap-3">
                                                {inventory.map((item, i) => (
                                                    <div key={i} className="flex items-center gap-3 text-sm text-slate-300 bg-slate-800/80 p-2 rounded-lg border border-slate-700">
                                                        <span className="text-amber-500">🗝️</span>
                                                        <span className="font-medium">{item}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Log */}
                                <div>
                                    <h4 className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-3">События</h4>
                                    <div className="space-y-2 text-[11px] text-slate-400 leading-tight">
                                        {log.map((m, i) => (
                                            <div key={i} className={`pb-2 ${i !== log.length-1 ? 'border-b border-white/5' : ''}`}>• {m}</div>
                                        ))}
                                    </div>
                                </div>

                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
